<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamTrack</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a6a;
    --accent3: #6affb8;
    --text: #e8e8f0;
    --muted: #7070a0;
    --mono: 'DM Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,106,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(106,255,184,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }

  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 3rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    overflow: hidden;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }

  .login-logo {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 0.25rem;
  }

  .login-logo span { color: var(--accent); }

  .login-sub {
    color: var(--muted);
    font-size: 0.85rem;
    font-family: var(--mono);
    margin-bottom: 2.5rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  input, select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 0.75rem 1rem;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 1.25rem;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }

  select option { background: var(--surface); }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    width: 100%;
    justify-content: center;
  }

  .btn-primary:hover { background: #6a58ee; transform: translateY(-1px); }

  .btn-sm {
    padding: 0.4rem 0.9rem;
    font-size: 0.8rem;
    border-radius: 6px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: rgba(255, 106, 106, 0.15);
    border: 1px solid rgba(255,106,106,0.3);
    color: var(--accent2);
  }

  .btn-danger:hover { background: rgba(255,106,106,0.25); }

  .btn-success {
    background: rgba(106,255,184,0.15);
    border: 1px solid rgba(106,255,184,0.3);
    color: var(--accent3);
  }

  .btn-success:hover { background: rgba(106,255,184,0.25); }

  .error-msg {
    background: rgba(255,106,106,0.1);
    border: 1px solid rgba(255,106,106,0.3);
    color: var(--accent2);
    padding: 0.6rem 1rem;
    border-radius: 6px;
    font-size: 0.82rem;
    font-family: var(--mono);
    margin-bottom: 1rem;
  }

  /* APP SHELL */
  #app { display: none; position: relative; z-index: 1; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .header-logo span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .user-badge {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.75rem;
    font-size: 0.82rem;
    font-family: var(--mono);
  }

  .role-tag {
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .role-admin { background: rgba(124,106,255,0.2); color: var(--accent); }
  .role-member { background: rgba(106,255,184,0.15); color: var(--accent3); }

  nav {
    display: flex;
    gap: 0.25rem;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nav-btn:hover { color: var(--text); background: var(--surface2); }
  .nav-btn.active { color: var(--accent); background: rgba(124,106,255,0.1); }

  main { padding: 2rem; max-width: 1100px; margin: 0 auto; }

  .page { display: none; }
  .page.active { display: block; }

  /* CARDS & STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.purple::after { background: var(--accent); }
  .stat-card.green::after { background: var(--accent3); }
  .stat-card.red::after { background: var(--accent2); }

  .stat-label {
    font-size: 0.72rem;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .stat-card.purple .stat-value { color: var(--accent); }
  .stat-card.green .stat-value { color: var(--accent3); }
  .stat-card.red .stat-value { color: var(--accent2); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .table-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .table-title {
    font-weight: 700;
    font-size: 0.95rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th {
    font-family: var(--mono);
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 0.75rem 1.5rem;
    text-align: left;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }

  td {
    padding: 0.8rem 1.5rem;
    font-size: 0.88rem;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    font-family: var(--mono);
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(124,106,255,0.04); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }

  .filters input, .filters select {
    margin-bottom: 0;
    flex: 1;
    min-width: 140px;
    max-width: 200px;
  }

  /* LOG FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .form-card h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
  }

  .form-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
  }

  .form-row .field { display: flex; flex-direction: column; }
  .form-row input, .form-row select { margin-bottom: 0; }

  /* LEADERBOARD */
  .lb-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    transition: background 0.15s;
  }

  .lb-item:hover { background: rgba(124,106,255,0.04); }
  .lb-item:last-child { border-bottom: none; }

  .lb-rank {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--muted);
    width: 2rem;
    text-align: center;
  }

  .lb-rank.top { color: var(--accent); font-weight: 700; font-size: 1rem; }

  .lb-name {
    flex: 1;
    font-weight: 600;
  }

  .lb-count {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent3);
    font-weight: 500;
  }

  .lb-bar-wrap {
    width: 120px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .lb-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* ADMIN USER MANAGEMENT */
  .user-row {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.8rem 1.5rem;
    border-bottom: 1px solid rgba(42,42,58,0.5);
  }

  .user-row:last-child { border-bottom: none; }

  .user-info { flex: 1; }
  .user-name { font-weight: 600; font-size: 0.9rem; }
  .user-role-label { font-size: 0.75rem; font-family: var(--mono); color: var(--muted); }

  .section-title {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 1.5rem;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem 1.25rem;
    font-family: var(--mono);
    font-size: 0.85rem;
    z-index: 999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(106,255,184,0.4); color: var(--accent3); }
  .toast.error { border-color: rgba(255,106,106,0.4); color: var(--accent2); }

  .empty {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .syncing {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.75rem;
    font-family: var(--mono);
    color: var(--muted);
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
    position: relative;
  }

  .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }

  .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Team<span>Track</span></div>
    <div class="login-sub">// productivity dashboard</div>
    <div id="login-error" class="error-msg" style="display:none"></div>
    <label>Username</label>
    <input type="text" id="login-user" placeholder="your username" autocomplete="username">
    <label>Password</label>
    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-logo">Team<span>Track</span></div>
    <nav id="main-nav">
      <button class="nav-btn active" onclick="showPage('log')" id="nav-log">Log Work</button>
      <button class="nav-btn" onclick="showPage('my-stats')" id="nav-my-stats">My Stats</button>
      <button class="nav-btn" onclick="showPage('leaderboard')" id="nav-leaderboard">Leaderboard</button>
      <button class="nav-btn" onclick="showPage('admin')" id="nav-admin" style="display:none">Admin</button>
    </nav>
    <div class="header-right">
      <div class="user-badge">
        <span id="header-username">—</span>
        <span class="role-tag" id="header-role">member</span>
      </div>
      <button class="btn btn-sm btn-outline" onclick="doLogout()">Sign out</button>
    </div>
  </header>

  <main>
    <!-- LOG WORK -->
    <div class="page active" id="page-log">
      <div class="section-title">Log Work</div>
      <div class="form-card">
        <h2>New Entry</h2>
        <div class="form-row">
          <div class="field">
            <label>Date</label>
            <input type="date" id="log-date">
          </div>
          <div class="field">
            <label>Task Type</label>
            <select id="log-task">
              <option value="">Select task...</option>
            </select>
          </div>
          <div class="field">
            <label>Count / Units</label>
            <input type="number" id="log-count" placeholder="e.g. 42" min="0">
          </div>
          <div class="field">
            <label>Notes (optional)</label>
            <input type="text" id="log-notes" placeholder="anything to add...">
          </div>
        </div>
        <div style="margin-top:1.25rem; display:flex; gap:0.75rem; align-items:center;">
          <button class="btn btn-primary" style="width:auto" onclick="submitLog()">Submit Entry</button>
          <span class="syncing" id="sync-indicator" style="display:none"><span class="dot"></span> syncing...</span>
        </div>
      </div>

      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Recent Entries</div>
        </div>
        <table>
          <thead><tr><th>Date</th><th>Task</th><th>Count</th><th>Notes</th></tr></thead>
          <tbody id="my-recent-body"></tbody>
        </table>
      </div>
    </div>

    <!-- MY STATS -->
    <div class="page" id="page-my-stats">
      <div class="section-title">My Stats</div>
      <div class="filters">
        <input type="date" id="stats-from" placeholder="From date">
        <input type="date" id="stats-to" placeholder="To date">
        <select id="stats-task"><option value="">All tasks</option></select>
        <button class="btn btn-sm btn-outline" onclick="loadMyStats()">Filter</button>
      </div>
      <div class="stats-grid" id="my-stats-cards"></div>
      <div class="table-wrap">
        <div class="table-header"><div class="table-title">Entry Log</div></div>
        <table>
          <thead><tr><th>Date</th><th>Task</th><th>Count</th><th>Notes</th></tr></thead>
          <tbody id="my-stats-body"></tbody>
        </table>
      </div>
    </div>

    <!-- LEADERBOARD -->
    <div class="page" id="page-leaderboard">
      <div class="section-title">Leaderboard</div>
      <div class="filters">
        <input type="date" id="lb-from">
        <input type="date" id="lb-to">
        <select id="lb-task"><option value="">All tasks</option></select>
        <button class="btn btn-sm btn-outline" onclick="loadLeaderboard()">Filter</button>
      </div>
      <div class="table-wrap">
        <div id="lb-list"></div>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="page" id="page-admin">
      <div class="section-title">Admin Panel</div>

      <!-- All Records -->
      <div class="table-wrap" style="margin-bottom:2rem">
        <div class="table-header">
          <div class="table-title">All Records</div>
          <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center">
            <input type="date" id="admin-from" style="margin:0;max-width:160px">
            <input type="date" id="admin-to" style="margin:0;max-width:160px">
            <select id="admin-user-filter" style="margin:0;max-width:160px"><option value="">All users</option></select>
            <select id="admin-task-filter" style="margin:0;max-width:160px"><option value="">All tasks</option></select>
            <button class="btn btn-sm btn-outline" onclick="loadAdminRecords()">Filter</button>
            <button class="btn btn-sm btn-success" onclick="refreshAll()">↻ Sync</button>
          </div>
        </div>
        <table>
          <thead><tr><th>Date</th><th>User</th><th>Task</th><th>Count</th><th>Notes</th><th>Actions</th></tr></thead>
          <tbody id="admin-records-body"></tbody>
        </table>
      </div>

      <!-- User Management -->
      <div class="table-wrap" style="margin-bottom:2rem">
        <div class="table-header">
          <div class="table-title">User Management</div>
          <button class="btn btn-sm btn-primary" onclick="openAddUser()">+ Add User</button>
        </div>
        <div id="user-list"></div>
      </div>

      <!-- Task Types -->
      <div class="table-wrap">
        <div class="table-header">
          <div class="table-title">Task Types</div>
          <button class="btn btn-sm btn-primary" onclick="openAddTask()">+ Add Task</button>
        </div>
        <div id="task-list"></div>
      </div>
    </div>
  </main>
</div>

<!-- Add User Modal -->
<div class="modal-overlay" id="modal-add-user">
  <div class="modal">
    <h3>Add New User</h3>
    <label>Username</label>
    <input type="text" id="new-username" placeholder="e.g. sarah">
    <label>Password</label>
    <input type="password" id="new-password" placeholder="set a password">
    <label>Role</label>
    <select id="new-role">
      <option value="member">Member</option>
      <option value="admin">Admin</option>
    </select>
    <div class="modal-actions">
      <button class="btn btn-sm btn-outline" onclick="closeModal('modal-add-user')">Cancel</button>
      <button class="btn btn-sm btn-primary" onclick="addUser()">Add User</button>
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="modal-add-task">
  <div class="modal">
    <h3>Add Task Type</h3>
    <label>Task Name</label>
    <input type="text" id="new-task-name" placeholder="e.g. Data Entry">
    <div class="modal-actions">
      <button class="btn btn-sm btn-outline" onclick="closeModal('modal-add-task')">Cancel</button>
      <button class="btn btn-sm btn-primary" onclick="addTask()">Add Task</button>
    </div>
  </div>
</div>

<!-- Edit Record Modal -->
<div class="modal-overlay" id="modal-edit-record">
  <div class="modal">
    <h3>Edit Record</h3>
    <input type="hidden" id="edit-record-id">
    <label>Date</label>
    <input type="date" id="edit-date">
    <label>Task Type</label>
    <select id="edit-task"></select>
    <label>Count</label>
    <input type="number" id="edit-count" min="0">
    <label>Notes</label>
    <input type="text" id="edit-notes">
    <div class="modal-actions">
      <button class="btn btn-sm btn-outline" onclick="closeModal('modal-edit-record')">Cancel</button>
      <button class="btn btn-sm btn-primary" onclick="saveEditRecord()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURATION — update SCRIPT_URL with your Apps Script URL
// ============================================================
const SCRIPT_URL = "https://script.google.com/a/macros/intelihub.com/s/AKfycbzNxzaM509fHJ9iuTXhgcU4A5L3AFzfDKLmrHFvIZ2B9gesc8OBMaFx0D2Z_WIRcL1sXA/exec";

// ============================================================
// LOCAL STATE (stored in localStorage)
// ============================================================
function getConfig() {
  const def = {
    users: [
      { username: "admin", password: "admin123", role: "admin" }
    ],
    tasks: ["Data Entry", "Calls", "Emails", "Follow-ups", "Other"]
  };
  try { return JSON.parse(localStorage.getItem("tt_config")) || def; } catch { return def; }
}

function saveConfig(cfg) { localStorage.setItem("tt_config", JSON.stringify(cfg)); }

let currentUser = null;
let allRecords = [];

// ============================================================
// AUTH
// ============================================================
function doLogin() {
  const u = document.getElementById("login-user").value.trim().toLowerCase();
  const p = document.getElementById("login-pass").value;
  const cfg = getConfig();
  const user = cfg.users.find(x => x.username.toLowerCase() === u && x.password === p);
  if (!user) {
    document.getElementById("login-error").textContent = "Invalid username or password.";
    document.getElementById("login-error").style.display = "block";
    return;
  }
  currentUser = user;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("header-username").textContent = user.username;
  document.getElementById("header-role").textContent = user.role;
  document.getElementById("header-role").className = "role-tag role-" + user.role;
  if (user.role === "admin") document.getElementById("nav-admin").style.display = "";
  setTodayDate();
  refreshAll();
}

function doLogout() {
  currentUser = null;
  allRecords = [];
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-user").value = "";
  document.getElementById("login-pass").value = "";
  document.getElementById("login-error").style.display = "none";
  document.getElementById("nav-admin").style.display = "none";
  showPage("log");
}

// ============================================================
// NAVIGATION
// ============================================================
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("page-" + id).classList.add("active");
  document.getElementById("nav-" + id).classList.add("active");
  if (id === "my-stats") loadMyStats();
  if (id === "leaderboard") loadLeaderboard();
  if (id === "admin") { loadAdminRecords(); renderUserList(); renderTaskList(); }
}

// ============================================================
// GOOGLE SHEETS API
// ============================================================
async function fetchRecords() {
  try {
    const r = await fetch(SCRIPT_URL);
    const data = await r.json();
    allRecords = data;
    return data;
  } catch(e) {
    showToast("Could not reach Google Sheets. Check your connection.", "error");
    return [];
  }
}

async function pushRecord(payload) {
  document.getElementById("sync-indicator").style.display = "inline-flex";
  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload),
      headers: { "Content-Type": "application/json" }
    });
    await fetchRecords();
    showToast("Entry saved!", "success");
  } catch(e) {
    showToast("Sync failed. Try again.", "error");
  }
  document.getElementById("sync-indicator").style.display = "none";
}

async function refreshAll() {
  await fetchRecords();
  renderMyRecent();
  populateTaskDropdowns();
}

// ============================================================
// TASK DROPDOWNS
// ============================================================
function populateTaskDropdowns() {
  const cfg = getConfig();
  const tasks = cfg.tasks;
  const ids = ["log-task", "stats-task", "lb-task", "admin-task-filter", "edit-task"];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    el.innerHTML = id === "log-task" ? '<option value="">Select task...</option>' : '<option value="">All tasks</option>';
    tasks.forEach(t => {
      const o = document.createElement("option");
      o.value = t; o.textContent = t;
      el.appendChild(o);
    });
    if (cur) el.value = cur;
  });
}

// ============================================================
// LOG WORK
// ============================================================
function setTodayDate() {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("log-date").value = today;
}

async function submitLog() {
  const date = document.getElementById("log-date").value;
  const task = document.getElementById("log-task").value;
  const count = parseInt(document.getElementById("log-count").value);
  const notes = document.getElementById("log-notes").value.trim();
  if (!date || !task || isNaN(count) || count < 0) {
    showToast("Please fill in date, task, and count.", "error"); return;
  }
  await pushRecord({ action: "upsert", date, user: currentUser.username, task_type: task, count, notes });
  document.getElementById("log-count").value = "";
  document.getElementById("log-notes").value = "";
  renderMyRecent();
}

function renderMyRecent() {
  const body = document.getElementById("my-recent-body");
  const mine = allRecords.filter(r => r.user === currentUser.username)
    .sort((a,b) => b.date > a.date ? 1 : -1).slice(0, 10);
  if (!mine.length) { body.innerHTML = '<tr><td colspan="4"><div class="empty">No entries yet.</div></td></tr>'; return; }
  body.innerHTML = mine.map(r => `
    <tr>
      <td>${r.date}</td>
      <td>${r.task_type}</td>
      <td>${r.count}</td>
      <td>${r.notes || '—'}</td>
    </tr>`).join("");
}

// ============================================================
// MY STATS
// ============================================================
function loadMyStats() {
  const from = document.getElementById("stats-from").value;
  const to = document.getElementById("stats-to").value;
  const task = document.getElementById("stats-task").value;
  let records = allRecords.filter(r => r.user === currentUser.username);
  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);
  if (task) records = records.filter(r => r.task_type === task);
  records.sort((a,b) => b.date > a.date ? 1 : -1);

  const total = records.reduce((s, r) => s + Number(r.count||0), 0);
  const days = new Set(records.map(r => r.date)).size;
  const avg = days ? Math.round(total / days) : 0;

  document.getElementById("my-stats-cards").innerHTML = `
    <div class="stat-card purple"><div class="stat-label">Total Units</div><div class="stat-value">${total}</div></div>
    <div class="stat-card green"><div class="stat-label">Days Logged</div><div class="stat-value">${days}</div></div>
    <div class="stat-card red"><div class="stat-label">Daily Avg</div><div class="stat-value">${avg}</div></div>
  `;

  const body = document.getElementById("my-stats-body");
  if (!records.length) { body.innerHTML = '<tr><td colspan="4"><div class="empty">No records match filters.</div></td></tr>'; return; }
  body.innerHTML = records.map(r => `
    <tr><td>${r.date}</td><td>${r.task_type}</td><td>${r.count}</td><td>${r.notes||'—'}</td></tr>`).join("");
}

// ============================================================
// LEADERBOARD
// ============================================================
function loadLeaderboard() {
  const from = document.getElementById("lb-from").value;
  const to = document.getElementById("lb-to").value;
  const task = document.getElementById("lb-task").value;
  let records = [...allRecords];
  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);
  if (task) records = records.filter(r => r.task_type === task);

  const totals = {};
  records.forEach(r => { totals[r.user] = (totals[r.user]||0) + Number(r.count||0); });
  const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;

  const ranks = ["🥇","🥈","🥉"];
  const container = document.getElementById("lb-list");
  if (!sorted.length) { container.innerHTML = '<div class="empty">No data yet.</div>'; return; }
  container.innerHTML = sorted.map(([user, count], i) => `
    <div class="lb-item">
      <div class="lb-rank ${i < 3 ? 'top' : ''}">${i < 3 ? ranks[i] : (i+1)}</div>
      <div class="lb-name">${user}${user === currentUser.username ? ' <span style="color:var(--muted);font-size:0.75rem">(you)</span>' : ''}</div>
      <div class="lb-bar-wrap"><div class="lb-bar" style="width:${Math.round(count/max*100)}%"></div></div>
      <div class="lb-count">${count}</div>
    </div>`).join("");
}

// ============================================================
// ADMIN — RECORDS
// ============================================================
function loadAdminRecords() {
  const from = document.getElementById("admin-from").value;
  const to = document.getElementById("admin-to").value;
  const user = document.getElementById("admin-user-filter").value;
  const task = document.getElementById("admin-task-filter").value;

  // populate user filter
  const cfg = getConfig();
  const uf = document.getElementById("admin-user-filter");
  const curU = uf.value;
  uf.innerHTML = '<option value="">All users</option>';
  cfg.users.forEach(u => { const o = document.createElement("option"); o.value = u.username; o.textContent = u.username; uf.appendChild(o); });
  if (curU) uf.value = curU;

  let records = [...allRecords];
  if (from) records = records.filter(r => r.date >= from);
  if (to) records = records.filter(r => r.date <= to);
  if (user) records = records.filter(r => r.user === user);
  if (task) records = records.filter(r => r.task_type === task);
  records.sort((a,b) => b.date > a.date ? 1 : -1);

  const body = document.getElementById("admin-records-body");
  if (!records.length) { body.innerHTML = '<tr><td colspan="6"><div class="empty">No records.</div></td></tr>'; return; }
  body.innerHTML = records.map((r, i) => `
    <tr>
      <td>${r.date}</td>
      <td>${r.user}</td>
      <td>${r.task_type}</td>
      <td>${r.count}</td>
      <td>${r.notes||'—'}</td>
      <td><button class="btn btn-sm btn-outline" onclick="openEditRecord(${allRecords.indexOf(r)})">Edit</button></td>
    </tr>`).join("");
}

// ============================================================
// ADMIN — USERS
// ============================================================
function renderUserList() {
  const cfg = getConfig();
  const el = document.getElementById("user-list");
  if (!cfg.users.length) { el.innerHTML = '<div class="empty">No users.</div>'; return; }
  el.innerHTML = cfg.users.map((u, i) => `
    <div class="user-row">
      <div class="user-info">
        <div class="user-name">${u.username}</div>
        <div class="user-role-label">${u.role}</div>
      </div>
      <span class="role-tag role-${u.role}">${u.role}</span>
      ${u.username !== currentUser.username ? `<button class="btn btn-sm btn-danger" onclick="removeUser(${i})">Remove</button>` : '<span style="font-size:0.75rem;color:var(--muted)">(you)</span>'}
    </div>`).join("");
}

function openAddUser() { document.getElementById("modal-add-user").classList.add("open"); }

function addUser() {
  const username = document.getElementById("new-username").value.trim().toLowerCase();
  const password = document.getElementById("new-password").value;
  const role = document.getElementById("new-role").value;
  if (!username || !password) { showToast("Username and password required.", "error"); return; }
  const cfg = getConfig();
  if (cfg.users.find(u => u.username === username)) { showToast("Username already exists.", "error"); return; }
  cfg.users.push({ username, password, role });
  saveConfig(cfg);
  closeModal("modal-add-user");
  document.getElementById("new-username").value = "";
  document.getElementById("new-password").value = "";
  renderUserList();
  showToast("User added!", "success");
}

function removeUser(i) {
  const cfg = getConfig();
  cfg.users.splice(i, 1);
  saveConfig(cfg);
  renderUserList();
  showToast("User removed.", "success");
}

// ============================================================
// ADMIN — TASKS
// ============================================================
function renderTaskList() {
  const cfg = getConfig();
  const el = document.getElementById("task-list");
  el.innerHTML = cfg.tasks.map((t, i) => `
    <div class="user-row">
      <div class="user-info"><div class="user-name">${t}</div></div>
      <button class="btn btn-sm btn-danger" onclick="removeTask(${i})">Remove</button>
    </div>`).join("");
}

function openAddTask() { document.getElementById("modal-add-task").classList.add("open"); }

function addTask() {
  const name = document.getElementById("new-task-name").value.trim();
  if (!name) { showToast("Task name required.", "error"); return; }
  const cfg = getConfig();
  if (cfg.tasks.includes(name)) { showToast("Task already exists.", "error"); return; }
  cfg.tasks.push(name);
  saveConfig(cfg);
  closeModal("modal-add-task");
  document.getElementById("new-task-name").value = "";
  renderTaskList();
  populateTaskDropdowns();
  showToast("Task added!", "success");
}

function removeTask(i) {
  const cfg = getConfig();
  cfg.tasks.splice(i, 1);
  saveConfig(cfg);
  renderTaskList();
  populateTaskDropdowns();
  showToast("Task removed.", "success");
}

// ============================================================
// EDIT RECORD
// ============================================================
function openEditRecord(idx) {
  const r = allRecords[idx];
  document.getElementById("edit-record-id").value = idx;
  document.getElementById("edit-date").value = r.date;
  document.getElementById("edit-count").value = r.count;
  document.getElementById("edit-notes").value = r.notes || "";
  populateTaskDropdowns();
  document.getElementById("edit-task").value = r.task_type;
  document.getElementById("modal-edit-record").classList.add("open");
}

async function saveEditRecord() {
  const idx = parseInt(document.getElementById("edit-record-id").value);
  const r = allRecords[idx];
  const payload = {
    action: "upsert",
    date: document.getElementById("edit-date").value,
    user: r.user,
    task_type: document.getElementById("edit-task").value,
    count: parseInt(document.getElementById("edit-count").value),
    notes: document.getElementById("edit-notes").value
  };
  closeModal("modal-edit-record");
  await pushRecord(payload);
  loadAdminRecords();
}

// ============================================================
// UTILS
// ============================================================
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

function showToast(msg, type="success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  setTimeout(() => { t.className = "toast"; }, 3000);
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter" && document.getElementById("login-screen").style.display !== "none") doLogin();
});

// Close modals on overlay click
document.querySelectorAll(".modal-overlay").forEach(o => {
  o.addEventListener("click", e => { if (e.target === o) o.classList.remove("open"); });
});

// Init
populateTaskDropdowns();
</script>
</body>
</html>
